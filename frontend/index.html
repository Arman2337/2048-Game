<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2048 Cloud Game</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app-container">
    <div class="game-wrapper">
      <header>
        <div class="titles">
          <h1>2048</h1>
          <p class="subtitle">Cloud Serverless Edition</p>
        </div>
        <div class="score-container">
          <div class="score-box">
            <div class="score-label">SCORE</div>
            <div id="score">0</div>
          </div>
          <div class="score-box">
            <div class="score-label">BEST</div>
            <div id="best-score">0</div>
          </div>
        </div>
      </header>

      <div class="controls">
        <button id="restart-btn" class="btn primary-btn">New Game</button>
      </div>

      <div class="game-container">
        <div class="game-board" id="game-board">
          <!-- Background Grid Cells -->
          <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
          <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
          <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
          <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
        </div>
        <!-- Foreground Tiles placed absolutely over the board -->
        <div id="tile-container"></div>
      </div>

      <!-- Game Over Overlay -->
      <div id="game-over" class="glass-overlay hidden">
        <h2>Game Over!</h2>
        <p>Score: <span id="final-score">0</span></p>
        <div class="submit-score-form">
          <input type="text" id="player-name" placeholder="Enter your name" maxlength="15">
          <button id="submit-score-btn" class="btn primary-btn">Submit Score</button>
          <div class="spinner hidden" id="submit-loading"></div>
          <p id="submit-msg" class="msg"></p>
        </div>
        <button id="try-again-btn" class="btn text-btn">Try Again</button>
      </div>
    </div>

    <!-- Leaderboard Sidebar -->
    <div class="leaderboard-wrapper">
      <div class="leaderboard-glass">
        <h3>Top Players 👑</h3>
        <div class="spinner hidden" id="leaderboard-loading"></div>
        <ul id="leaderboard-list">
          <!-- Populated via API -->
           <li class="lb-placeholder">Loading top scores...</li>
        </ul>
        <button id="refresh-lb-btn" class="btn text-btn small-btn">↻ Refresh</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
